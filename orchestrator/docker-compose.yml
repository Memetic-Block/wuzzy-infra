name: wuzzy-infra-orchestrator

services:
  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redisdata:/data
    command: [ "redis-server" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - postgresdata:/var/lib/postgresql/18/docker

volumes:
  redisdata:
    driver: local
  postgresdata:
    driver: local
